name: Update live status image

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch: {}        # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check recent commit activity and decide which reel to use
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="adijad"
          WINDOW_HOURS=24

          # Pull the user's recent public events
          EVENTS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
                        -H "Accept: application/vnd.github+json" \
                        "https://api.github.com/users/${USERNAME}/events/public?per_page=30")

          # Cutoff timestamp (ISO 8601, WINDOW_HOURS ago)
          CUTOFF=$(date -u -d "-${WINDOW_HOURS} hours" +%Y-%m-%dT%H:%M:%SZ)

          # Check if any PushEvent happened after the cutoff
          HAS_RECENT_PUSH=$(echo "$EVENTS" | jq -r --arg cutoff "$CUTOFF" '
            [.[] | select(.type == "PushEvent") | select(.created_at > $cutoff)] | length > 0
          ')

          if [ "$HAS_RECENT_PUSH" = "true" ]; then
            echo "source_file=assets/working_reel_hq.webp" >> "$GITHUB_OUTPUT"
            echo "Decision: WORKING (recent commit found)"
          else
            echo "source_file=assets/resting_reel_hq.webp" >> "$GITHUB_OUTPUT"
            echo "Decision: RESTING (no recent commit)"
          fi

      - name: Copy chosen reel to the fixed "live" filename
        run: |
          cp "${{ steps.decide.outputs.source_file }}" assets/live_status.webp

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/live_status.webp
          if git diff --cached --quiet; then
            echo "No change, skipping commit."
          else
            git commit -m "Update live status image [automated]"
            git push
          fi